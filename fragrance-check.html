<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 코드 확인 | 채아힐링센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto">

        <!-- 헤더 -->
        <header class="text-center mb-5 pt-4">
            <h1 class="text-2xl font-bold text-gray-800">주문 코드 확인</h1>
            <p class="text-sm text-gray-500 mt-1">코드를 붙여넣으면 향료 이름을 확인해드려요</p>
            <div class="flex flex-wrap items-center justify-center gap-2 mt-3">
                <a href="fragrance.html"
                   class="inline-block text-sm text-purple-600 border border-purple-200 bg-purple-50 hover:bg-purple-100 px-3 py-1.5 rounded-full transition">
                    🔍 이름 → 코드 찾기
                </a>
                <a href="blending.html"
                   class="inline-block text-sm text-purple-600 border border-purple-200 bg-purple-50 hover:bg-purple-100 px-3 py-1.5 rounded-full transition">
                    🧪 블랜딩 계산기
                </a>
            </div>
        </header>

        <!-- 입력창 -->
        <div class="mb-3">
            <label for="input" class="block text-sm font-medium text-gray-600 mb-1.5">
                주문 화면의 코드를 입력하거나 붙여넣으세요
            </label>
            <textarea
                id="input"
                rows="3"
                inputmode="text"
                placeholder="예) PB02, PB42, PB62, PB13, PB06"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 shadow-sm bg-white text-base
                       focus:outline-none focus:ring-2 focus:ring-purple-400 focus:border-purple-400"></textarea>
            <p class="text-xs text-gray-400 mt-1.5">
                쉼표·띄어쓰기·줄바꿈 아무렇게나 넣어도 코드(PB00)만 자동으로 찾아냅니다.
            </p>
        </div>

        <!-- 요약 배지 -->
        <div id="summary" class="hidden flex-wrap gap-2 mb-4"></div>

        <!-- 결과 목록 -->
        <div id="result" class="space-y-2"></div>

        <!-- 안내(초기 상태) -->
        <div id="hint" class="text-center text-gray-400 py-14">
            <div class="text-4xl mb-2">🧾</div>
            <p>위 칸에 코드를 넣으면<br>향료 이름이 여기에 표시됩니다.</p>
        </div>

        <footer class="text-center text-xs text-gray-300 mt-8 pb-6">채아힐링센터 컬러테라피</footer>
    </div>

    <script src="fragrance-data.js"></script>
    <script>
        // 코드 → 이름 조회용 맵
        const codeToName = {};
        window.FRAGRANCES.forEach(f => { codeToName[f.code.toUpperCase()] = f.name; });

        const inputEl = document.getElementById('input');
        const summaryEl = document.getElementById('summary');
        const resultEl = document.getElementById('result');
        const hintEl = document.getElementById('hint');

        // 입력 텍스트에서 PB코드 추출 (예: pb2, PB 02, PB02 → 모두 PB02 로 정규화)
        function extractCodes(text) {
            const matches = text.match(/pb\s*0*\d{1,3}/gi) || [];
            return matches.map(m => {
                const num = m.replace(/[^0-9]/g, '');       // 숫자만
                return 'PB' + num.padStart(2, '0');          // 두 자리로 정규화
            });
        }

        function render() {
            const codes = extractCodes(inputEl.value);

            if (codes.length === 0) {
                summaryEl.classList.add('hidden');
                resultEl.innerHTML = '';
                hintEl.classList.remove('hidden');
                return;
            }
            hintEl.classList.add('hidden');

            let validCount = 0, errorCount = 0;
            const seen = {};

            const rows = codes.map((code, idx) => {
                const name = codeToName[code];
                const isDup = seen[code];              // 이미 나온 코드인지 (중복 표시용)
                seen[code] = (seen[code] || 0) + 1;

                if (name) {
                    validCount++;
                    return `
                        <div class="flex items-center gap-3 bg-white rounded-xl border border-gray-200 px-4 py-3 shadow-sm">
                            <span class="shrink-0 w-6 text-center text-gray-400 text-sm">${idx + 1}</span>
                            <span class="shrink-0 font-mono font-semibold text-purple-600 tracking-wide">${code}</span>
                            <span class="text-gray-300">→</span>
                            <span class="font-medium text-gray-800 truncate">${name}</span>
                            ${isDup ? '<span class="ml-auto shrink-0 text-xs text-amber-600 bg-amber-50 border border-amber-200 px-2 py-0.5 rounded-full">중복</span>' : '<span class="ml-auto shrink-0 text-green-500">✓</span>'}
                        </div>`;
                } else {
                    errorCount++;
                    return `
                        <div class="flex items-center gap-3 bg-red-50 rounded-xl border border-red-200 px-4 py-3 shadow-sm">
                            <span class="shrink-0 w-6 text-center text-red-300 text-sm">${idx + 1}</span>
                            <span class="shrink-0 font-mono font-semibold text-red-600 tracking-wide">${code}</span>
                            <span class="text-red-300">→</span>
                            <span class="font-medium text-red-600">❌ 없는 코드예요! 확인 필요</span>
                        </div>`;
                }
            }).join('');

            resultEl.innerHTML = rows;

            // 요약 배지
            const dupCount = Object.values(seen).filter(n => n > 1).length;
            const badges = [
                `<span class="inline-flex items-center gap-1 text-sm bg-gray-100 text-gray-700 px-3 py-1 rounded-full">총 <b>${codes.length}</b>개</span>`,
                `<span class="inline-flex items-center gap-1 text-sm bg-green-100 text-green-700 px-3 py-1 rounded-full">정상 <b>${validCount}</b>개</span>`,
            ];
            if (errorCount > 0) {
                badges.push(`<span class="inline-flex items-center gap-1 text-sm bg-red-100 text-red-700 px-3 py-1 rounded-full">오류 <b>${errorCount}</b>개</span>`);
            }
            if (dupCount > 0) {
                badges.push(`<span class="inline-flex items-center gap-1 text-sm bg-amber-100 text-amber-700 px-3 py-1 rounded-full">중복 <b>${dupCount}</b>종</span>`);
            }
            summaryEl.innerHTML = badges.join('');
            summaryEl.classList.remove('hidden');
        }

        inputEl.addEventListener('input', render);
    </script>
</body>
</html>
