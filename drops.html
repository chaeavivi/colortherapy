<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>컬러 아로마 향수 방울수 계산기 | 채아힐링센터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        sage:   { 50:'#f2f6f3', 100:'#e3ece6', 200:'#c9dccf', 300:'#a8c0b0', 400:'#88a794', 500:'#6d8d7a', 600:'#577363', 700:'#465c50', 800:'#3a4b42' },
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .chip { transition: transform .08s ease, background-color .15s ease, border-color .15s ease; }
        .chip:active { transform: scale(.96); }
        .step-btn { transition: transform .08s ease; }
        .step-btn:active { transform: scale(.9); }
        .hidden { display: none !important; }
        .dim { opacity: .35; filter: grayscale(.4); }
    </style>
</head>
<body class="bg-sage-50 min-h-screen p-4">

    <div class="w-full max-w-2xl mx-auto">

        <!-- 헤더 -->
        <header class="text-center mb-5 pt-4">
            <h1 class="text-2xl font-bold text-sage-700">컬러 아로마 힐링 향수 조향</h1>
            <p class="text-sm text-sage-500 mt-1">향료를 고르고 방울수를 배분하면 총 방울수를 계산해드려요</p>
        </header>

        <!-- STEP 1. 향수 무드 -->
        <section class="mb-5">
            <h2 class="text-sm font-bold text-sage-700 mb-2 flex items-center gap-1.5">
                <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-sage-500 text-white text-xs">1</span>
                향수 무드 <span class="text-sage-400 font-normal">(선택 · 원하는 무드를 켜면 향료가 강조돼요)</span>
            </h2>
            <div id="moodChips" class="flex flex-wrap gap-1.5"></div>
        </section>

        <!-- STEP 2. 향료 선택 -->
        <section class="mb-5">
            <h2 class="text-sm font-bold text-sage-700 mb-2 flex items-center gap-1.5">
                <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-sage-500 text-white text-xs">2</span>
                노트별 향료 선택
            </h2>
            <div id="noteGroups" class="space-y-3"></div>
        </section>

        <!-- STEP 3. 방울수 배분 -->
        <section class="mb-8">
            <h2 class="text-sm font-bold text-sage-700 mb-2 flex items-center gap-1.5">
                <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-sage-500 text-white text-xs">3</span>
                향료별 방울수 배분 <span class="text-sage-400 font-normal">(목표 <span id="targetLabel">40</span>방울)</span>
            </h2>
            <div id="result"></div>
        </section>

        <!-- 향수 컬러 방울수 (부가) -->
        <section class="mb-8">
            <h2 class="text-sm font-bold text-sage-700 mb-2 flex items-center gap-1.5">
                <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-sage-400 text-white text-xs">🎨</span>
                향수 컬러 방울수 <span class="text-sage-400 font-normal">(목표 20방울)</span>
            </h2>
            <div id="colorPanel" class="rounded-xl border border-sage-200 bg-white p-3"></div>
        </section>

        <footer class="text-center text-xs text-sage-300 mt-8 pb-6">
            채아힐링센터 컬러테라피 · © 2024 Chaeahealingcenter
        </footer>
    </div>

    <!-- 토스트 -->
    <div id="toast"
        class="fixed left-1/2 -translate-x-1/2 bottom-6 bg-sage-800 text-white text-sm px-4 py-2 rounded-full shadow-lg
               opacity-0 pointer-events-none transition-opacity duration-200 z-20">
    </div>

    <script>
        // ─────────────────────────────────────────────
        //  향료 데이터 — 워크시트(3p) 표 그대로
        //  note: 구분(T/M/B) · family: 계열 · name: 아로마 오일
        // ─────────────────────────────────────────────
        const OILS = [
            // 1열
            { note: 'B',   family: '우디',    name: '시더우드' },
            { note: 'T',   family: '시트러스', name: '오렌지' },
            { note: 'T',   family: '시트러스', name: '레몬' },
            { note: 'T',   family: '시트러스', name: '베르가못' },
            { note: 'T',   family: '민트',    name: '스피어민트' },
            { note: 'M',   family: '허브',    name: '로즈마리' },
            { note: 'T/M', family: '허브',    name: '라벤더' },
            // 2열
            { note: 'T/M', family: '허브',    name: '타임' },
            { note: 'M',   family: '플로럴',  name: '제라늄' },
            { note: 'T',   family: '시트러스', name: '만다린' },
            { note: 'T',   family: '시트러스', name: '그레이프프룻' },
            { note: 'M',   family: '허브',    name: '바질' },
            { note: 'M',   family: '허브',    name: '클라리세이지' },
            { note: 'B',   family: '우디',    name: '로즈우드' },
            // 3열
            { note: 'B',   family: '우디',    name: '베티버' },
            { note: 'M/B', family: '플로럴',  name: '참파카' },
            { note: 'M',   family: '그린',    name: '팔마로사' },
            { note: 'T',   family: '시트러스', name: '라임' },
            { note: 'B',   family: '발삼',    name: '벤조인' },
            { note: 'M/B', family: '프루티',  name: '카시스' },
            { note: 'M',   family: '플로럴',  name: '히아신스' },
        ];

        const TARGET = 40;          // 향료 총 방울수 목표
        const COLOR_TARGET = 20;    // 컬러 총 방울수 목표

        // 향수 무드 → 계열 매핑 (워크시트 무드 체크박스)
        const MOODS = [
            { key: 'citrus',  label: '상큼한',    sub: '시트러스',    families: ['시트러스'] },
            { key: 'floral',  label: '꽃향기',    sub: '플로럴',      families: ['플로럴'] },
            { key: 'cool',    label: '시원한',    sub: '캠퍼/민트',   families: ['민트'] },
            { key: 'woody',   label: '나무',      sub: '우디',        families: ['우디'] },
            { key: 'green',   label: '풀향기',    sub: '그린/허브',   families: ['그린', '허브'] },
            { key: 'powder',  label: '비누/파우더', sub: '파우더리',   families: ['발삼', '프루티'] },
        ];

        // 구분(T/M/B) → 노트 그룹 (첫 글자 기준)
        const NOTES = [
            { key: 'T', ko: 'Top · 탑노트',    emoji: '🍃', desc: '가장 먼저 나는 첫인상 향',
              head: 'text-emerald-700', chip: 'bg-emerald-50 text-emerald-800 border-emerald-200',
              on: 'bg-emerald-500 text-white border-emerald-500', dot: 'bg-emerald-400', soft: 'bg-emerald-50/60 border-emerald-200' },
            { key: 'M', ko: 'Middle · 미들노트', emoji: '🌿', desc: '향의 중심이 되는 하트',
              head: 'text-sage-700', chip: 'bg-sage-100 text-sage-800 border-sage-300',
              on: 'bg-sage-500 text-white border-sage-500', dot: 'bg-sage-400', soft: 'bg-sage-100/70 border-sage-300' },
            { key: 'B', ko: 'Base · 베이스노트', emoji: '🪵', desc: '오래 남는 잔향',
              head: 'text-stone-700', chip: 'bg-stone-100 text-stone-700 border-stone-300',
              on: 'bg-stone-600 text-white border-stone-600', dot: 'bg-stone-500', soft: 'bg-stone-100 border-stone-300' },
        ];
        const primaryNote = o => o.note[0];   // 'T/M' → 'T', 'M/B' → 'M'
        const byNote = { T: [], M: [], B: [] };
        OILS.forEach(o => byNote[primaryNote(o)].push(o));

        // 컬러 데이터 (워크시트 7색 파스텔)
        const COLORS = [
            { key: 'red',    ko: '레드',   css: '#f6a6a6' },
            { key: 'orange', ko: '오렌지', css: '#f7c59f' },
            { key: 'yellow', ko: '옐로우', css: '#f6e7a1' },
            { key: 'green',  ko: '그린',   css: '#b7e0be' },
            { key: 'blue',   ko: '블루',   css: '#b3e2ea' },
            { key: 'navy',   ko: '인디고', css: '#b9c2ec' },
            { key: 'purple', ko: '퍼플',   css: '#cdb8e6' },
        ];

        // ─────────────────────────────────────────────
        //  상태
        // ─────────────────────────────────────────────
        const activeMoods = new Set();     // 켜진 무드 key
        const selected = new Set();        // 선택된 향료 이름
        const drops = {};                  // { 향료이름: 방울수 }
        const colorSel = new Set();        // 선택된 컬러 key
        const colorDrops = {};             // { 컬러key: 방울수 }

        const selectedInNote = k => byNote[k].filter(o => selected.has(o.name));
        const oilMoodMatch = o => activeMoods.size === 0
            ? false
            : MOODS.some(m => activeMoods.has(m.key) && m.families.includes(o.family));

        // 목표를 선택 향료에 최대한 고르게 분배
        function evenAlloc(total, n) {
            if (n === 0) return [];
            const base = Math.floor(total / n), rem = total - base * n;
            return Array.from({ length: n }, (_, i) => base + (i < rem ? 1 : 0));
        }

        // ─────────────────────────────────────────────
        //  STEP 1 — 무드 칩
        // ─────────────────────────────────────────────
        const moodChipsEl = document.getElementById('moodChips');
        function renderMoods() {
            moodChipsEl.innerHTML = MOODS.map(m => {
                const on = activeMoods.has(m.key);
                return `
                    <button data-mood="${m.key}"
                        class="chip rounded-xl border px-3 py-2 text-sm text-left leading-tight
                               ${on ? 'bg-sage-500 text-white border-sage-500 shadow-sm' : 'bg-white text-sage-700 border-sage-200'}">
                        <div class="font-bold">${m.label}${on ? ' ✓' : ''}</div>
                        <div class="text-[11px] ${on ? 'text-white/80' : 'text-sage-400'}">${m.sub}</div>
                    </button>`;
            }).join('');
        }

        // ─────────────────────────────────────────────
        //  STEP 2 — 향료 선택
        // ─────────────────────────────────────────────
        const noteGroupsEl = document.getElementById('noteGroups');
        function renderNoteGroups() {
            noteGroupsEl.innerHTML = NOTES.map(n => {
                const chips = byNote[n.key].map(o => {
                    const on = selected.has(o.name);
                    const match = oilMoodMatch(o);
                    const dim = activeMoods.size > 0 && !match && !on;
                    return `
                        <button data-name="${o.name}"
                            class="chip rounded-full border px-3 py-1.5 text-sm ${on ? n.on : n.chip} ${dim ? 'dim' : ''} ${match && !on ? 'ring-2 ring-amber-300' : ''}">
                            ${o.name}<span class="opacity-60 text-[11px]"> · ${o.family}</span><span class="opacity-50 text-[10px] ml-0.5">${o.note}</span>${on ? ' ✓' : ''}
                        </button>`;
                }).join('');
                const cnt = selectedInNote(n.key).length;
                return `
                    <div class="rounded-xl border ${n.soft} p-3">
                        <div class="flex items-center justify-between mb-1">
                            <div class="font-bold ${n.head} flex items-center gap-1.5">
                                <span>${n.emoji}</span>${n.ko}
                            </div>
                            <span class="text-[11px] text-sage-500">${cnt}종 선택</span>
                        </div>
                        <p class="text-[11px] text-sage-400 mb-2">${n.desc}</p>
                        <div class="flex flex-wrap gap-1.5">${chips}</div>
                    </div>`;
            }).join('');
        }

        // ─────────────────────────────────────────────
        //  STEP 3 — 방울수 배분 + 검증
        // ─────────────────────────────────────────────
        const resultEl = document.getElementById('result');
        function renderResult() {
            if (selected.size === 0) {
                resultEl.innerHTML = `
                    <div class="text-center text-sage-400 py-10 bg-white rounded-xl border border-sage-200">
                        <div class="text-3xl mb-2">🧪</div>
                        위에서 향료를 선택하면<br>향료별 방울수가 여기에 표시됩니다.
                    </div>`;
                return;
            }

            let total = 0;
            const noteBlocks = NOTES.map(n => {
                const oils = selectedInNote(n.key);
                if (oils.length === 0) return '';
                const sub = oils.reduce((s, o) => s + (drops[o.name] || 0), 0);
                total += sub;
                const rows = oils.map(o => {
                    const c = drops[o.name] || 0;
                    return `
                        <div class="flex items-center gap-2 py-1.5">
                            <span class="w-2 h-2 rounded-full ${n.dot} shrink-0"></span>
                            <span class="font-medium text-gray-800">${o.name}</span>
                            <span class="text-[11px] text-sage-400">${o.family} · ${o.note}</span>
                            <span class="ml-auto inline-flex items-center rounded-lg border border-sage-300 bg-white overflow-hidden">
                                <button data-act="dec" data-name="${o.name}" class="step-btn w-9 h-9 text-xl text-sage-600 hover:bg-sage-50 leading-none">−</button>
                                <span class="w-12 text-center font-bold text-gray-900">${c}<span class="text-[11px] font-normal text-sage-400">방울</span></span>
                                <button data-act="inc" data-name="${o.name}" class="step-btn w-9 h-9 text-xl text-sage-600 hover:bg-sage-50 leading-none">＋</button>
                            </span>
                        </div>`;
                }).join('');
                return `
                    <div class="rounded-lg border ${n.soft} px-3 py-2">
                        <div class="flex items-center gap-1.5 mb-1 pb-1 border-b border-white/60">
                            <span>${n.emoji}</span>
                            <span class="font-bold ${n.head}">${n.ko}</span>
                            <span class="text-xs text-sage-500">${sub}방울</span>
                            <button data-fill="${n.key}" class="ml-auto text-[11px] text-sage-600 border border-sage-200 bg-white hover:bg-sage-50 px-2 py-0.5 rounded-full">고르게 채우기</button>
                        </div>
                        ${rows}
                    </div>`;
            }).join('');

            const diff = total - TARGET;
            const pct = Math.min(100, Math.round(total / TARGET * 100));
            const statusText = diff === 0
                ? `<span class="text-emerald-100">목표 ${TARGET}방울과 딱 맞아요 ✓</span>`
                : diff < 0
                    ? `<span class="text-amber-100">${-diff}방울 더 넣어야 해요</span>`
                    : `<span class="text-red-100">${diff}방울 초과됐어요</span>`;
            const barColor = diff === 0 ? 'bg-emerald-300' : diff < 0 ? 'bg-white' : 'bg-red-300';

            resultEl.innerHTML = `
                <div class="rounded-xl bg-gradient-to-br from-sage-500 to-sage-600 text-white p-4 mb-3 shadow-sm">
                    <div class="flex items-end justify-between">
                        <div>
                            <div class="text-xs text-white/80">총 방울수</div>
                            <div class="text-3xl font-bold">${total} <span class="text-base font-medium text-white/80">/ ${TARGET}방울</span></div>
                        </div>
                        <div class="text-right text-sm">${statusText}</div>
                    </div>
                    <div class="mt-2 h-2 rounded-full bg-white/25 overflow-hidden">
                        <div class="h-full ${barColor} transition-all" style="width:${pct}%"></div>
                    </div>
                </div>
                <div class="space-y-2">${noteBlocks}</div>
                <div class="flex gap-2 mt-3">
                    <button id="autoBtn" class="flex-1 bg-sage-500 hover:bg-sage-600 active:scale-95 text-white text-sm font-bold py-2.5 rounded-lg transition">
                        ✨ ${TARGET}방울 고르게 자동 배분
                    </button>
                </div>
                <div class="flex gap-2 mt-2">
                    <button id="copyBtn" class="flex-1 bg-sage-800 hover:bg-sage-900 active:scale-95 text-white text-sm font-medium py-2.5 rounded-lg transition">📋 레시피 복사</button>
                    <button id="resetBtn" class="px-4 bg-white border border-sage-300 hover:bg-sage-50 active:scale-95 text-sage-600 text-sm font-medium py-2.5 rounded-lg transition">초기화</button>
                </div>`;
        }

        // 목표를 향료 전체에 고르게 재분배
        function autoFillAll() {
            const names = [];
            NOTES.forEach(n => selectedInNote(n.key).forEach(o => names.push(o.name)));
            const alloc = evenAlloc(TARGET, names.length);
            names.forEach((nm, i) => { drops[nm] = alloc[i]; });
        }
        // 한 노트 안에서만: 그 노트에 배정된 합을 유지하며 고르게
        function autoFillNote(key) {
            const oils = selectedInNote(key);
            const cur = oils.reduce((s, o) => s + (drops[o.name] || 0), 0);
            const alloc = evenAlloc(cur, oils.length);
            oils.forEach((o, i) => { drops[o.name] = alloc[i]; });
        }

        function recipeText() {
            let total = 0;
            const lines = ['[컬러 아로마 힐링 향수 조향]'];
            NOTES.forEach(n => {
                const oils = selectedInNote(n.key);
                if (!oils.length) return;
                lines.push(`\n■ ${n.ko}`);
                oils.forEach(o => {
                    const c = drops[o.name] || 0; total += c;
                    lines.push(`  - ${o.name} (${o.family}·${o.note}) ${c}방울`);
                });
            });
            const cLines = COLORS.filter(c => colorSel.has(c.key)).map(c => `  - ${c.ko} ${colorDrops[c.key] || 0}방울`);
            if (cLines.length) {
                const ct = cLines.length ? COLORS.filter(c => colorSel.has(c.key)).reduce((s,c)=>s+(colorDrops[c.key]||0),0) : 0;
                lines.push(`\n■ 향수 컬러 (총 ${ct}방울)`);
                lines.push(...cLines);
            }
            lines.push(`\n향료 총 ${total}방울 (목표 ${TARGET}방울)`);
            return lines.join('\n');
        }

        // ─────────────────────────────────────────────
        //  향수 컬러 방울수 패널
        // ─────────────────────────────────────────────
        const colorPanelEl = document.getElementById('colorPanel');
        function renderColors() {
            const total = COLORS.filter(c => colorSel.has(c.key)).reduce((s, c) => s + (colorDrops[c.key] || 0), 0);
            const diff = total - COLOR_TARGET;
            const status = colorSel.size === 0
                ? `<span class="text-sage-400">컬러를 선택하세요</span>`
                : diff === 0 ? `<span class="text-emerald-600 font-semibold">딱 맞음 ✓</span>`
                : diff < 0 ? `<span class="text-amber-600 font-semibold">${-diff}방울 부족</span>`
                : `<span class="text-red-500 font-semibold">${diff}방울 초과</span>`;

            const swatches = COLORS.map(c => {
                const on = colorSel.has(c.key);
                return `
                    <button data-color="${c.key}" class="chip flex flex-col items-center gap-1">
                        <span class="w-10 h-10 rounded-full border-2 ${on ? 'border-sage-600 ring-2 ring-sage-300' : 'border-white shadow'}"
                              style="background:${c.css}"></span>
                        <span class="text-[10px] ${on ? 'text-sage-700 font-bold' : 'text-sage-400'}">${c.ko}</span>
                    </button>`;
            }).join('');

            const rows = COLORS.filter(c => colorSel.has(c.key)).map(c => {
                const v = colorDrops[c.key] || 0;
                return `
                    <div class="flex items-center gap-2 py-1.5">
                        <span class="w-4 h-4 rounded-full shrink-0" style="background:${c.css}"></span>
                        <span class="font-medium text-gray-800">${c.ko}</span>
                        <span class="ml-auto inline-flex items-center rounded-lg border border-sage-300 bg-white overflow-hidden">
                            <button data-cact="dec" data-color="${c.key}" class="step-btn w-9 h-9 text-xl text-sage-600 hover:bg-sage-50 leading-none">−</button>
                            <span class="w-12 text-center font-bold text-gray-900">${v}<span class="text-[11px] font-normal text-sage-400">방울</span></span>
                            <button data-cact="inc" data-color="${c.key}" class="step-btn w-9 h-9 text-xl text-sage-600 hover:bg-sage-50 leading-none">＋</button>
                        </span>
                    </div>`;
            }).join('');

            colorPanelEl.innerHTML = `
                <p class="text-[11px] text-sage-400 mb-2">원하는 컬러를 체크하고 방울수를 배분하세요 · 목표 ${COLOR_TARGET}방울</p>
                <div class="flex flex-wrap justify-between gap-1 mb-3">${swatches}</div>
                ${colorSel.size ? `
                    <div class="flex items-center justify-between text-sm border-t border-sage-100 pt-2 mb-1">
                        <span class="font-bold text-sage-700">컬러 합계 ${total} / ${COLOR_TARGET}방울</span>
                        ${status}
                    </div>
                    <div>${rows}</div>
                    <button id="colorAutoBtn" class="w-full mt-2 bg-sage-400 hover:bg-sage-500 active:scale-95 text-white text-sm font-bold py-2 rounded-lg transition">✨ ${COLOR_TARGET}방울 고르게 배분</button>
                ` : ''}`;
        }
        function autoFillColors() {
            const keys = COLORS.filter(c => colorSel.has(c.key)).map(c => c.key);
            const alloc = evenAlloc(COLOR_TARGET, keys.length);
            keys.forEach((k, i) => { colorDrops[k] = alloc[i]; });
        }

        // ─────────────────────────────────────────────
        //  이벤트
        // ─────────────────────────────────────────────
        moodChipsEl.addEventListener('click', e => {
            const btn = e.target.closest('[data-mood]');
            if (!btn) return;
            const k = btn.dataset.mood;
            activeMoods.has(k) ? activeMoods.delete(k) : activeMoods.add(k);
            renderMoods();
            renderNoteGroups();
        });

        noteGroupsEl.addEventListener('click', e => {
            const btn = e.target.closest('.chip');
            if (!btn) return;
            const name = btn.dataset.name;
            if (selected.has(name)) { selected.delete(name); delete drops[name]; }
            else { selected.add(name); drops[name] = drops[name] || 0; }
            renderNoteGroups();
            renderResult();
        });

        resultEl.addEventListener('click', async e => {
            const step = e.target.closest('.step-btn');
            if (step && step.dataset.name) {
                const name = step.dataset.name;
                const cur = drops[name] || 0;
                drops[name] = step.dataset.act === 'inc' ? cur + 1 : Math.max(0, cur - 1);
                renderResult();
                return;
            }
            const fill = e.target.closest('[data-fill]');
            if (fill) { autoFillNote(fill.dataset.fill); renderResult(); return; }
            if (e.target.closest('#autoBtn')) { autoFillAll(); renderResult(); showToast(`${TARGET}방울을 고르게 배분했어요`); return; }
            if (e.target.closest('#resetBtn')) {
                selected.clear();
                for (const k in drops) delete drops[k];
                renderNoteGroups(); renderResult();
                showToast('향료를 초기화했어요');
                return;
            }
            if (e.target.closest('#copyBtn')) {
                const text = recipeText();
                try {
                    if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(text);
                    else {
                        const ta = document.createElement('textarea');
                        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
                        document.body.appendChild(ta); ta.select();
                        document.execCommand('copy'); document.body.removeChild(ta);
                    }
                    showToast('레시피가 복사되었어요');
                } catch (err) { showToast('복사에 실패했어요'); }
            }
        });

        colorPanelEl.addEventListener('click', e => {
            const sw = e.target.closest('[data-color]');
            const step = e.target.closest('[data-cact]');
            if (step) {
                const k = step.dataset.color, cur = colorDrops[k] || 0;
                colorDrops[k] = step.dataset.cact === 'inc' ? cur + 1 : Math.max(0, cur - 1);
                renderColors();
                return;
            }
            if (sw) {
                const k = sw.dataset.color;
                if (colorSel.has(k)) { colorSel.delete(k); delete colorDrops[k]; }
                else { colorSel.add(k); colorDrops[k] = colorDrops[k] || 0; }
                renderColors();
                return;
            }
            if (e.target.closest('#colorAutoBtn')) { autoFillColors(); renderColors(); showToast(`${COLOR_TARGET}방울을 고르게 배분했어요`); }
        });

        // ─────────────────────────────────────────────
        //  토스트 & 초기 렌더
        // ─────────────────────────────────────────────
        let toastTimer;
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0'); t.classList.add('opacity-100');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.classList.add('opacity-0'); t.classList.remove('opacity-100'); }, 1500);
        }
        document.getElementById('targetLabel').textContent = TARGET;

        renderMoods();
        renderNoteGroups();
        renderResult();
        renderColors();
    </script>
</body>
</html>
